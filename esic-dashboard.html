<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel e-SIC</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f4f6f9; }

.cards { display:flex; flex-wrap:wrap; gap:15px; margin-bottom:20px; }

.card {
  flex:1; min-width:180px; background:#fff;
  padding:15px; border-left:5px solid #1d4ed8;
  border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.graficos {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

@media(max-width:900px){
  .graficos { grid-template-columns:1fr; }
}

canvas { background:#fff; padding:10px; border-radius:10px; }

button {
  margin:5px;
  padding:8px 12px;
  border:none;
  background:#1d4ed8;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

button:hover { background:#2563eb; }
</style>
</head>

<body>

<h2>Relatório Estatístico e-SIC - Câmara Municipal de Nova Andradina/MS</h2>

<div class="cards" id="cards"></div>

<div class="graficos">
  <div>
    <h3>Status</h3>
    <canvas id="graficoStatus"></canvas>
  </div>
  <div>
    <h3>Ano</h3>
    <canvas id="graficoAno"></canvas>
  </div>
  <div>
    <h3>Tipo de Solicitante</h3>
    <canvas id="graficoTipo"></canvas>
  </div>
</div>

<h3>Filtros</h3>
Ano:
<select id="filtroAno"><option value="">Todos</option></select>

Status:
<select id="filtroStatus">
<option value="">Todos</option>
<option>ATENDIDA</option>
<option>INDEFERIDA</option>
<option>EM ANDAMENTO</option>
</select>

<br><br>

<button onclick="exportarCSV()">Baixar Excel</button>
<button onclick="exportarPDF()">Baixar PDF</button>

<h3>Dados detalhados</h3>

<table id="tabela" class="display">
<thead>
<tr>
<th>Ano</th>
<th>Data Solicitação</th>
<th>Data Resposta</th>
<th>Status</th>
<th>Área</th>
<th>Tipo</th>
<th>Cidade</th>
</tr>
</thead>
</table>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
let dadosGlobais = [];
let dadosFiltrados = [];

let graficoStatus, graficoAno, graficoTipo;

function parseDate(dateStr){
  if(!dateStr) return null;
  if(dateStr.includes('-')) return new Date(dateStr);
  if(dateStr.includes('/')){
    const p = dateStr.split('/');
    return new Date(p[2], p[1]-1, p[0]);
  }
  return null;
}

function atualizarTudo(data){

  dadosFiltrados = data;

  // INDICADORES
  const total = data.length;
  const atendidas = data.filter(d=>d.Status==="ATENDIDA").length;
  const indeferidas = data.filter(d=>d.Status==="INDEFERIDA").length;
  const andamento = data.filter(d=>d.Status==="EM ANDAMENTO").length;

  let totalDias=0, count=0;

  data.forEach(d=>{
    const i=parseDate(d["Data Solicitação"]);
    const f=parseDate(d["Data Resposta"]);
    if(i && f){
      totalDias+=(f-i)/(1000*60*60*24);
      count++;
    }
  });

  const prazo = count ? (totalDias/count).toFixed(1) : 0;

  document.getElementById('cards').innerHTML = `
    <div class="card"><b>Total:</b> ${total}</div>
    <div class="card"><b>Atendidas:</b> ${atendidas}</div>
    <div class="card"><b>Indeferidas:</b> ${indeferidas}</div>
    <div class="card"><b>Em andamento:</b> ${andamento}</div>
    <div class="card"><b>% Atendimento:</b> ${total ? ((atendidas/total)*100).toFixed(1) : 0}%</div>
    <div class="card"><b>Prazo médio:</b> ${prazo} dias</div>
  `;

  // STATUS
  const statusCount = {};
  data.forEach(d=> statusCount[d.Status]=(statusCount[d.Status]||0)+1);

  graficoStatus.destroy();
  graficoStatus = new Chart(graficoStatusCtx,{
    type:'bar',
    data:{
      labels:Object.keys(statusCount),
      datasets:[{
        label:'Quantidade',
        data:Object.values(statusCount),
        backgroundColor:Object.keys(statusCount).map(s=>{
          if(s==="ATENDIDA") return "#16a34a";
          if(s==="INDEFERIDA") return "#dc2626";
          if(s==="EM ANDAMENTO") return "#f59e0b";
          return "#6b7280";
        })
      }]
    }
  });

  // ANO
  const anoCount={};
  data.forEach(d=> anoCount[d.Ano]=(anoCount[d.Ano]||0)+1);

  graficoAno.destroy();
  graficoAno = new Chart(graficoAnoCtx,{
    type:'bar',
    data:{
      labels:Object.keys(anoCount),
      datasets:[{
        label:'Quantidade',
        data:Object.values(anoCount),
        backgroundColor:"#3b82f6"
      }]
    }
  });

  // TIPO
  const tipoCount={};
  data.forEach(d=> tipoCount[d["Tipo de Solicitante"]] = (tipoCount[d["Tipo de Solicitante"]]||0)+1);

  graficoTipo.destroy();
  graficoTipo = new Chart(graficoTipoCtx,{
    type:'pie',
    data:{
      labels:Object.keys(tipoCount),
      datasets:[{data:Object.values(tipoCount)}]
    }
  });

}

let graficoStatusCtx = document.getElementById('graficoStatus').getContext('2d');
let graficoAnoCtx = document.getElementById('graficoAno').getContext('2d');
let graficoTipoCtx = document.getElementById('graficoTipo').getContext('2d');

fetch('dados-esic.json')
.then(r=>r.json())
.then(data=>{

  // NORMALIZA STATUS
  data.forEach(d=>{
    let s=(d.Status||"").toUpperCase();
    if(s.includes("RESOLVIDA")||s.includes("ATEND")) d.Status="ATENDIDA";
    else if(s.includes("INDEFER")) d.Status="INDEFERIDA";
    else if(s.includes("ANDAMENTO")) d.Status="EM ANDAMENTO";
    else d.Status="NÃO INFORMADO";
  });

  dadosGlobais=data;

  // FILTRO ANO
  [...new Set(data.map(d=>d.Ano))].forEach(a=>{
    $('#filtroAno').append(`<option>${a}</option>`);
  });

  graficoStatus = new Chart(graficoStatusCtx,{type:'bar',data:{labels:[],datasets:[{data:[]}]}});
  graficoAno = new Chart(graficoAnoCtx,{type:'bar',data:{labels:[],datasets:[{data:[]}]}});
  graficoTipo = new Chart(graficoTipoCtx,{type:'pie',data:{labels:[],datasets:[{data:[]}]}});
  
  atualizarTudo(data);

  const tabela = $('#tabela').DataTable({
    data:data,
    columns:[
      {data:'Ano'},
      {data:'Data Solicitação'},
      {data:'Data Resposta'},
      {data:'Status'},
      {data:'Área'},
      {data:'Tipo de Solicitante'},
      {data:'Cidade'}
    ]
  });

  $('#filtroAno, #filtroStatus').on('change', function(){

    let filtrado = dadosGlobais;

    const ano = $('#filtroAno').val();
    const status = $('#filtroStatus').val();

    if(ano) filtrado = filtrado.filter(d=>d.Ano==ano);
    if(status) filtrado = filtrado.filter(d=>d.Status==status);

    tabela.clear().rows.add(filtrado).draw();
    atualizarTudo(filtrado);

  });

});

// EXPORTAR CSV
function exportarCSV(){
  let csv = "Ano,Data Solicitação,Data Resposta,Status,Área,Tipo,Cidade\n";
  dadosFiltrados.forEach(d=>{
    csv += `${d.Ano},${d["Data Solicitação"]},${d["Data Resposta"]},${d.Status},${d.Área},${d["Tipo de Solicitante"]},${d.Cidade}\n`;
  });

  const blob = new Blob([csv]);
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = "relatorio_esic.csv";
  link.click();
}

// PDF
function exportarPDF(){
  window.print();
}
</script>

</body>
</html>
