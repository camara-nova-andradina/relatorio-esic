<script>
function getCampo(obj, nome){
  const chave = Object.keys(obj).find(k => k.trim().toLowerCase() === nome.toLowerCase());
  return chave ? obj[chave] : "";
}

function parseDateBR(dateStr){
  if(!dateStr || !dateStr.includes('/')) return null;
  const parts = dateStr.split('/');
  return new Date(parts[2], parts[1]-1, parts[0]);
}

function normalizarStatus(status){
  if(!status) return "NÃO INFORMADO";

  status = status.toString().trim().toUpperCase();

  if(status.includes("RESOLVIDA") || status.includes("ATEND")) return "ATENDIDA";
  if(status.includes("INDEFER")) return "INDEFERIDA";
  if(status.includes("ANDAMENTO")) return "EM ANDAMENTO";

  return "NÃO INFORMADO";
}

fetch('dados-esic.json')
.then(r=>r.json())
.then(data=>{

  const dados = data.map(d => {

    const status = normalizarStatus(getCampo(d,"Status"));
    const ano = getCampo(d,"Ano") || "Não informado";
    const dataSolic = getCampo(d,"Data Solicitação");
    const dataResp = getCampo(d,"Data Resposta");

    return {
      Ano: ano,
      "Data Solicitação": dataSolic,
      "Data Resposta": dataResp,
      Status: status,
      Área: getCampo(d,"Área"),
      "Tipo de Solicitante": getCampo(d,"Tipo de Solicitante"),
      Cidade: getCampo(d,"Cidade")
    };
  });

  // PRAZO MÉDIO
  let totalDias = 0;
  let count = 0;

  dados.forEach(d=>{
    const i = parseDateBR(d["Data Solicitação"]);
    const f = parseDateBR(d["Data Resposta"]);
    if(i && f){
      totalDias += (f-i)/(1000*60*60*24);
      count++;
    }
  });

  const prazo = count ? (totalDias/count).toFixed(1) : 0;

  // CONTAGEM
  const total = dados.length;
  const atendidas = dados.filter(d=>d.Status==="ATENDIDA").length;
  const indeferidas = dados.filter(d=>d.Status==="INDEFERIDA").length;
  const andamento = dados.filter(d=>d.Status==="EM ANDAMENTO").length;

  document.getElementById('cards').innerHTML = `
    <div class="card"><h3>Total</h3><p>${total}</p></div>
    <div class="card"><h3>Atendidas</h3><p>${atendidas}</p></div>
    <div class="card"><h3>Indeferidas</h3><p>${indeferidas}</p></div>
    <div class="card"><h3>Em Andamento</h3><p>${andamento}</p></div>
    <div class="card"><h3>% Atendimento</h3><p>${((atendidas/total)*100).toFixed(1)}%</p></div>
    <div class="card"><h3>Prazo Médio (dias)</h3><p>${prazo}</p></div>
  `;

  // STATUS
  const cores = {
    "ATENDIDA":"#16a34a",
    "INDEFERIDA":"#dc2626",
    "EM ANDAMENTO":"#f59e0b",
    "NÃO INFORMADO":"#6b7280"
  };

  const statusCount = {};
  dados.forEach(d=>{
    statusCount[d.Status]=(statusCount[d.Status]||0)+1;
  });

  new Chart(document.getElementById('graficoStatus'), {
    type:'bar',
    data:{
      labels:Object.keys(statusCount),
      datasets:[{
        data:Object.values(statusCount),
        backgroundColor:Object.keys(statusCount).map(s=>cores[s])
      }]
    }
  });

  // ANO
  const anoCount = {};
  dados.forEach(d=>{
    anoCount[d.Ano]=(anoCount[d.Ano]||0)+1;
  });

  new Chart(document.getElementById('graficoAno'), {
    type:'bar',
    data:{
      labels:Object.keys(anoCount),
      datasets:[{
        data:Object.values(anoCount),
        backgroundColor:"#3b82f6"
      }]
    }
  });

  // TIPO
  const tipoCount = {};
  dados.forEach(d=>{
    tipoCount[d["Tipo de Solicitante"]] = (tipoCount[d["Tipo de Solicitante"]]||0)+1;
  });

  new Chart(document.getElementById('graficoTipo'), {
    type:'pie',
    data:{
      labels:Object.keys(tipoCount),
      datasets:[{data:Object.values(tipoCount)}]
    }
  });

  // TABELA
  const tabela = $('#tabela').DataTable({
    data:dados,
    columns:[
      {data:'Ano'},
      {data:'Data Solicitação'},
      {data:'Data Resposta'},
      {data:'Status'},
      {data:'Área'},
      {data:'Tipo de Solicitante'},
      {data:'Cidade'}
    ]
  });

  $('#filtroAno').on('change', function(){
    tabela.column(0).search(this.value).draw();
  });

  $('#filtroStatus').on('change', function(){
    tabela.column(3).search(this.value).draw();
  });

});
</script>
