<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel e-SIC</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- 🔥 NOVA BIBLIOTECA PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:20px; background:#f4f6f9; }

.cards { display:flex; flex-wrap:wrap; gap:15px; margin-bottom:20px; }

.card {
  flex:1; min-width:180px; background:#fff;
  padding:15px; border-left:5px solid #1d4ed8;
  border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.graficos {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

#graficoStatus,#graficoAno { max-height:300px; }
#graficoTipo { max-height:420px; }

canvas { background:#fff; padding:10px; border-radius:10px; }

button {
  margin:5px; padding:8px 12px;
  border:none; background:#1d4ed8; color:white;
  border-radius:5px; cursor:pointer;
}

button:hover { background:#2563eb; }

#areaRelatorio { margin:15px 0; }
</style>
</head>

<body>

<h2>Relatório Estatístico e-SIC - Câmara Municipal de Nova Andradina/MS</h2>

<div class="cards" id="cards"></div>

<div class="graficos">
  <canvas id="graficoStatus"></canvas>
  <canvas id="graficoAno"></canvas>
  <canvas id="graficoTipo"></canvas>
</div>

<br>

Ano:
<select id="filtroAno"><option value="">Todos</option></select>

Status:
<select id="filtroStatus">
<option value="">Todos</option>
<option>ATENDIDA</option>
<option>INDEFERIDA</option>
<option>EM ANDAMENTO</option>
</select>

<div id="areaRelatorio"></div>

<br>

<button onclick="exportarCSV()">📥 Excel</button>
<button onclick="exportarPDF()">📄 PDF</button>

<h3>Dados detalhados</h3>

<table id="tabela" class="display">
<thead>
<tr>
<th>Ano</th><th>Data Solicitação</th><th>Data Resposta</th>
<th>Status</th><th>Área</th><th>Tipo</th><th>Cidade</th>
</tr>
</thead>
</table>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>

const { jsPDF } = window.jspdf;

let dadosGlobais=[], dadosFiltrados=[];
let graficoStatus, graficoAno, graficoTipo;

const anosComRelatorio=[2020,2021,2023,2024,2025];

function parseDate(d){
  if(!d) return null;
  if(d.includes('-')) return new Date(d);
  if(d.includes('/')){
    let p=d.split('/');
    return new Date(p[2],p[1]-1,p[0]);
  }
}

function atualizarTudo(data){

  dadosFiltrados=data;

  let total=data.length;
  let atendidas=data.filter(d=>d.Status==="ATENDIDA").length;
  let indeferidas=data.filter(d=>d.Status==="INDEFERIDA").length;
  let andamento=data.filter(d=>d.Status==="EM ANDAMENTO").length;

  document.getElementById('cards').innerHTML=`
  <div class="card">Total: ${total}</div>
  <div class="card">Atendidas: ${atendidas}</div>
  <div class="card">Indeferidas: ${indeferidas}</div>
  <div class="card">Em andamento: ${andamento}</div>`;

  let statusCount={},tipoCount={};

  data.forEach(d=>{
    statusCount[d.Status]=(statusCount[d.Status]||0)+1;
    tipoCount[d["Tipo de Solicitante"]]=(tipoCount[d["Tipo de Solicitante"]]||0)+1;
  });

  graficoStatus.destroy();
  graficoStatus=new Chart(graficoStatusCtx,{
    type:'bar',
    data:{labels:Object.keys(statusCount),datasets:[{data:Object.values(statusCount)}]}
  });

  graficoTipo.destroy();
  graficoTipo=new Chart(graficoTipoCtx,{
    type:'pie',
    data:{labels:Object.keys(tipoCount),datasets:[{data:Object.values(tipoCount)}]}
  });
}

function atualizarBotaoRelatorio(ano){
  let area=document.getElementById('areaRelatorio');
  if(anosComRelatorio.includes(parseInt(ano))){
    area.innerHTML=`<button onclick="window.open('relatorios/relatorio_esic_${ano}.pdf')">📄 Relatório ${ano}</button>`;
  } else area.innerHTML="";
}

let graficoStatusCtx=document.getElementById('graficoStatus').getContext('2d');
let graficoTipoCtx=document.getElementById('graficoTipo').getContext('2d');

fetch('dados-esic.json')
.then(r=>r.json())
.then(data=>{

  data.forEach(d=>{
    let s=(d.Status||"").toUpperCase();
    if(s.includes("RESOLVIDA")||s.includes("ATEND")) d.Status="ATENDIDA";
    else if(s.includes("INDEFER")) d.Status="INDEFERIDA";
    else d.Status="EM ANDAMENTO";
  });

  dadosGlobais=data;

  [...new Set(data.map(d=>d.Ano))].forEach(a=>{
    $('#filtroAno').append(`<option>${a}</option>`);
  });

  graficoStatus=new Chart(graficoStatusCtx,{type:'bar',data:{labels:[],datasets:[{data:[]}]}});

  graficoTipo=new Chart(graficoTipoCtx,{type:'pie',data:{labels:[],datasets:[{data:[]}]}});

  atualizarTudo(data);

  let tabela=$('#tabela').DataTable({
    data:data,
    columns:[
      {data:'Ano'},{data:'Data Solicitação'},{data:'Data Resposta'},
      {data:'Status'},{data:'Área'},{data:'Tipo de Solicitante'},{data:'Cidade'}
    ]
  });

  $('#filtroAno,#filtroStatus').on('change',function(){
    let f=dadosGlobais;
    let ano=$('#filtroAno').val();
    let status=$('#filtroStatus').val();
    if(ano) f=f.filter(d=>d.Ano==ano);
    if(status) f=f.filter(d=>d.Status==status);
    tabela.clear().rows.add(f).draw();
    atualizarTudo(f);
    atualizarBotaoRelatorio(ano);
  });

});

function exportarPDF(){

  let doc=new jsPDF();

  doc.setFontSize(14);
  doc.text("Relatório Estatístico e-SIC",10,10);
  doc.text("Câmara Municipal de Nova Andradina/MS",10,18);

  doc.setFontSize(10);
  doc.text("Total: "+dadosFiltrados.length,10,30);

  let y=40;

  dadosFiltrados.forEach(d=>{
    doc.text(`${d.Ano} - ${d.Status}`,10,y);
    y+=6;
    if(y>280){ doc.addPage(); y=10; }
  });

  doc.save("relatorio_esic.pdf");
}

function exportarCSV(){
  let csv="Ano,Status\n";
  dadosFiltrados.forEach(d=>{
    csv+=`${d.Ano},${d.Status}\n`;
  });
  let blob=new Blob([csv]);
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download="relatorio.csv";
  a.click();
}

</script>

</body>
</html>
